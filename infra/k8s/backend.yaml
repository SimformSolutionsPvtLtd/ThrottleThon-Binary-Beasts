apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: smartersprint
spec:
  replicas: 2
  selector: { matchLabels: { app: backend } }
  template:
    metadata: { labels: { app: backend } }
    spec:
      containers:
        - name: backend
          image: smartersprint/backend:latest
          ports: [{ containerPort: 3000 }]
          envFrom:
            - secretRef: { name: smartersprint-secrets }
            - configMapRef: { name: smartersprint-config }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: smartersprint
spec:
  ports: [{ port: 3000, targetPort: 3000 }]
  selector: { app: backend }
