# Replace values, then: kubectl apply -f infra/k8s/secrets.example.yaml
apiVersion: v1
kind: Secret
metadata:
  name: smartersprint-secrets
  namespace: smartersprint
type: Opaque
stringData:
  DATABASE_URL: postgresql://smartersprint:smartersprint@postgres:5432/smartersprint?schema=public
  POSTGRES_USER: smartersprint
  POSTGRES_PASSWORD: smartersprint
  POSTGRES_DB: smartersprint
  JWT_ACCESS_SECRET: replace-me
  JWT_REFRESH_SECRET: replace-me
  GEMINI_API_KEY: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smartersprint-config
  namespace: smartersprint
data:
  NODE_ENV: production
  APP_PORT: "3000"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  AI_PROVIDER: gemini
  LOG_LEVEL: info
