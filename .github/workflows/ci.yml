name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend · build + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartersprint
          POSTGRES_PASSWORD: smartersprint
          POSTGRES_DB: smartersprint
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U smartersprint"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://smartersprint:smartersprint@localhost:5432/smartersprint?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      REDIS_HOST: localhost
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build

  frontend:
    name: Frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      - run: npm run lint --if-present
      - run: npm run build

  docker:
    name: Docker · build images
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./infra/docker/backend.Dockerfile
          push: false
          tags: smartersprint/backend:ci
      - name: Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./infra/docker/frontend.Dockerfile
          push: false
          tags: smartersprint/frontend:ci
